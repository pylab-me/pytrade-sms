name: Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_mode:
        description: "Release mode"
        required: false
        default: "latest"
        type: choice
        options:
          - latest
      private_src_ref:
        description: "Private source repository ref"
        required: false
        default: "main"

defaults:
  run:
    shell: bash

permissions:
  contents: write

jobs:
  build_wheels:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release_mode == 'latest')
    uses: ./.github/workflows/build-wheels.yml
    with:
      private_src_repo_slug: ${{ vars.PYTRADE_SMS_PRIVATE_REPO_SLUG }}
      private_src_ref: ${{ inputs.private_src_ref || vars.PYTRADE_SMS_PRIVATE_REPO_REF || 'main' }}
    secrets:
      private_repo_token: ${{ secrets.GH_POPTRIE_TOKEN }}

  publish_latest:
    runs-on: ubuntu-latest
    needs: build_wheels
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release_mode == 'latest')
    steps:
      - name: Remove latest release
        uses: actions/github-script@v8
        with:
          script: |
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: "latest",
              });
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id,
              });
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: "tags/latest",
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          generate_release_notes: true
          files: |
            dist/*.whl
